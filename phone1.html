<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#111;
  color:white;
  font-family:Arial;
}
button{
  font-size:40px;
  margin:20px;
  padding:20px;
}
</style>
</head>

<body>

<h2>Player 1</h2>

<button onclick="send('up')">⬆️</button>
<button onclick="send('down')">⬇️</button>

<script>
const sb = supabase.createClient(
"https://kqhquyeeroskszhblsvq.supabase.co",
"sb_publishable_JMOdzvwVNDBTpHlqKy584Q_Z5SvuYmh"
);

const channel = sb.channel("pong");
channel.subscribe();

function send(dir){
  channel.send({
    type:"broadcast",
    event:"move",
    payload:{
      player:"left",
      dir
    }
  });
}
</script>

</body>
</html>
