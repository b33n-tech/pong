<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pong Supabase</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
html,body{
  margin:0;
  background:#000;
  overflow:hidden;
}
canvas{
  display:block;
  margin:auto;
  background:#000;
}
#status{
  position:fixed;
  top:10px;
  left:10px;
  color:#aaa;
  font-family:Arial;
  font-size:14px;
}
</style>
</head>

<body>

<div id="status">Connexion...</div>
<canvas id="c"></canvas>

<script>
const SUPABASE_URL = "https://kqhquyeeroskszhblsvq.supabase.co";
const SUPABASE_KEY = "sb_publishable_JMOdzvwVNDBTpHlqKy584Q_Z5SvuYmh";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById("c");
canvas.width = 800;
canvas.height = 500;
const ctx = canvas.getContext("2d");

const status = document.getElementById("status");

let state = null;

/* ---------------- INIT STATE ---------------- */
async function init(){

  let { data } = await sb
    .from("pong_state")
    .select("*")
    .eq("id",1)
    .maybeSingle();

  if(!data){
    state = {
      id:1,
      ball_x:400,
      ball_y:250,
      vel_x:4,
      vel_y:3,
      paddle_left:200,
      paddle_right:200
    };

    await sb.from("pong_state").insert(state);
  } else {
    state = data;
  }

  status.innerText = "Connecté 🎮";
}

init();

/* ---------------- DRAW ---------------- */
function draw(){

  ctx.fillStyle="#000";
  ctx.fillRect(0,0,800,500);

  // ball
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(state.ball_x, state.ball_y, 8, 0, Math.PI*2);
  ctx.fill();

  // paddles
  ctx.fillRect(10, state.paddle_left, 10, 80);
  ctx.fillRect(780, state.paddle_right, 10, 80);

  // center line
  ctx.fillStyle="#222";
  for(let i=0;i<10;i++){
    ctx.fillRect(398,i*50,4,20);
  }
}

/* ---------------- PHYSICS ---------------- */
function update(){

  state.ball_x += state.vel_x;
  state.ball_y += state.vel_y;

  if(state.ball_y < 0 || state.ball_y > 500){
    state.vel_y *= -1;
  }

  // left paddle
  if(
    state.ball_x < 25 &&
    state.ball_y > state.paddle_left &&
    state.ball_y < state.paddle_left + 80
  ){
    state.vel_x *= -1;
    state.ball_x = 25;
  }

  // right paddle
  if(
    state.ball_x > 775 &&
    state.ball_y > state.paddle_right &&
    state.ball_y < state.paddle_right + 80
  ){
    state.vel_x *= -1;
    state.ball_x = 775;
  }
}

/* ---------------- LOOP ---------------- */
async function loop(){

  if(state){
    update();
    draw();

    await sb
      .from("pong_state")
      .update(state)
      .eq("id",1);
  }

  requestAnimationFrame(loop);
}

loop();

/* ---------------- INPUT LISTENER ---------------- */
sb.channel("inputs")
.on(
  "postgres_changes",
  {
    event:"INSERT",
    schema:"public",
    table:"pong_input"
  },
  ({new:input})=>{

    if(input.player === "left"){
      state.paddle_left += input.direction === "up" ? -30 : 30;
      state.paddle_left = Math.max(0, Math.min(420, state.paddle_left));
    }

    if(input.player === "right"){
      state.paddle_right += input.direction === "up" ? -30 : 30;
      state.paddle_right = Math.max(0, Math.min(420, state.paddle_right));
    }
  }
)
.subscribe();

</script>

</body>
</html>
