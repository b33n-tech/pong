<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Pong</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:black;overflow:hidden;}
canvas{display:block;margin:auto;background:#000;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const SUPABASE_URL="https://kqhquyeeroskszhblsvq.supabase.co";
const SUPABASE_KEY="sb_publishable_JMOdzvwVNDBTpHlqKy584Q_Z5SvuYmh";
const supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const canvas=document.getElementById("c");
canvas.width=800;
canvas.height=500;
const ctx=canvas.getContext("2d");

let state=null;

async function load(){
  const {data} = await supabase
    .from("pong_state")
    .select("*")
    .eq("id",1)
    .single();

  state=data;
}
load();

function updatePhysics(){

  state.ball_x += state.vel_x;
  state.ball_y += state.vel_y;

  // rebonds haut bas
  if(state.ball_y<0 || state.ball_y>500){
    state.vel_y *= -1;
  }

  // collision paddle gauche
  if(state.ball_x<20 &&
     state.ball_y>state.paddle_left &&
     state.ball_y<state.paddle_left+80){
    state.vel_x *= -1;
  }

  // collision droite
  if(state.ball_x>780 &&
     state.ball_y>state.paddle_right &&
     state.ball_y<state.paddle_right+80){
    state.vel_x *= -1;
  }

}

function draw(){

  ctx.clearRect(0,0,800,500);

  // ball
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(state.ball_x,state.ball_y,8,0,Math.PI*2);
  ctx.fill();

  // paddles
  ctx.fillRect(10,state.paddle_left,10,80);
  ctx.fillRect(780,state.paddle_right,10,80);

}

async function loop(){

  if(state){

    updatePhysics();
    draw();

    await supabase
      .from("pong_state")
      .update(state)
      .eq("id",1);
  }

  requestAnimationFrame(loop);
}

loop();

supabase
.channel("pong")
.on("postgres_changes",
  {event:"UPDATE",schema:"public",table:"pong_state"},
  payload=>{
    state=payload.new;
  }
)
.subscribe();

</script>
</body>
</html>
